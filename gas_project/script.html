<script>
  // グローバルな予約データ保持用
  const bookingData = {
    store: '',
    date: '',
    time: '',
    name: '',
    kana: '',
    phone: '',
    email: ''
  };

  let appConfig = { config: {}, stores: [] };
  let originalAppConfig = null;
  let previousAdminStore = '';
  let isDirty = false;

  function markDirty() {
    isDirty = true;
    document.querySelectorAll('.dirty-warning').forEach(el => el.style.display = 'inline-block');
  }

  function clearDirty() {
    isDirty = false;
    document.querySelectorAll('.dirty-warning').forEach(el => el.style.display = 'none');
  }

  function checkDirtyNavigation(targetFunction) {
    if (isDirty) {
      if (!confirm('保存されていない変更があります。保存せずに移動しますか？')) {
        return;
      }
      // 変更を破棄して元の状態に戻す
      if (originalAppConfig) {
        appConfig = JSON.parse(JSON.stringify(originalAppConfig));
      }
    }
    clearDirty(); // ユーザーが移動を選んだ場合、警告はクリアして移動
    if (typeof window[targetFunction] === 'function') {
      window[targetFunction]();
    }
  }

  // ページ読み込み時の処理
  window.onload = () => {
    const pageParam = document.getElementById('page-param').value;
    if (pageParam === 'cancel') {
      goToCancel();
    } else if (pageParam === 'admin') {
      goToAdminAuth();
    }

    loadInitialData();

    // 管理画面内の変更検知
    document.addEventListener('input', function (e) {
      if (document.body.classList.contains('admin-mode') && e.target.closest('.step-section.active')) {
        markDirty();
      }
    });
    document.addEventListener('change', function (e) {
      if (document.body.classList.contains('admin-mode') && e.target.closest('.step-section.active')) {
        markDirty();
      }
    });
  };

  function toggleDefaultCampaign() {
    const isNoCampaign = document.getElementById('sys-default-no-campaign').checked;
    const group = document.getElementById('sys-default-campaign-group');
    if (isNoCampaign) {
      group.style.opacity = '0.5';
      group.style.pointerEvents = 'none';
    } else {
      group.style.opacity = '1';
      group.style.pointerEvents = 'auto';
    }
  }

  function toggleStoreCampaign(checkbox) {
    const group = checkbox.closest('.admin-day-block').querySelector('.store-campaign-group');
    if (checkbox.checked) {
      group.style.opacity = '0.5';
      group.style.pointerEvents = 'none';
    } else {
      group.style.opacity = '1';
      group.style.pointerEvents = 'auto';
    }
  }

  function loadInitialData() {
    google.script.run
      .withSuccessHandler((data) => {
        appConfig = data;
        originalAppConfig = JSON.parse(JSON.stringify(data)); // オリジナルのコピーを保持
        updateStoreDropdowns();
        renderStoreButtons(); // 初期画面の店舗ボタンを描画
      })
      .getAppConfig();
  }

  function updateStoreDropdowns() {
    const dropdownIds = ['store-select', 'admin-store-select', 'admin-cal-store-select'];
    dropdownIds.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const firstOption = el.options[0];
      el.innerHTML = '';
      el.appendChild(firstOption);

      appConfig.stores.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.店舗名;
        opt.textContent = s.店舗名;
        el.appendChild(opt);
      });
    });
  }

  // 初期画面の店舗選択ボタンを生成
  function renderStoreButtons() {
    const container = document.getElementById('store-button-container');
    if (!container) return;

    if (!appConfig.stores || appConfig.stores.length === 0) {
      container.innerHTML = '<div class="text-center" style="padding: 20px;">店舗情報がありません。</div>';
      return;
    }

    container.innerHTML = '';
    appConfig.stores.forEach(s => {
      const card = document.createElement('div');
      card.className = 'store-card';
      card.onclick = () => selectStore(s.店舗名);

      card.innerHTML = `
      <h3>${s.店舗名}</h3>
      <div class="store-info-row">
        <span class="store-info-label">住所</span>
        <span>${s.住所 || '---'}</span>
      </div>
      <div class="store-info-row">
        <span class="store-info-label">電話</span>
        <span>${s.電話番号 || '---'}</span>
      </div>
    `;
      container.appendChild(card);
    });
  }

  // 店舗選択時の処理
  function selectStore(storeName) {
    // dropdownを同期
    const select = document.getElementById('store-select');
    if (select) {
      select.value = storeName;
      // 通信を先に開始する
      loadWeeklyCalendarFromStore();
    }
    // その後で画面を切り替える
    goToStep(2);
  }

  // 曜日リスト
  const daysOfWeek = ['月', '火', '水', '木', '金', '土', '日', '祝'];

  // ステップ切り替え処理
  function goToStep(step) {
    if (step === 5) {
      const email = document.getElementById('email').value.trim();
      const emailConfirm = document.getElementById('email-confirm').value.trim();
      const phone = document.getElementById('phone').value.trim();

      // メールアドレスの一致チェック
      if (email !== emailConfirm) {
        alert('入力されたメールアドレスが確認用と一致しません。もう一度ご確認ください。');
        return;
      }

      // メールアドレスの形式チェック
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        alert('有効なメールアドレスの形式で入力してください。');
        return;
      }

      // 電話番号の形式チェック（スペースやハイフンを除外して数字8〜20桁）
      const cleanPhone = phone.replace(/[\s\+\-]/g, '');
      const phoneRegex = /^[0-9]{8,20}$/;
      if (!phoneRegex.test(cleanPhone)) {
        alert('有効な電話番号を入力してください。');
        return;
      }
    }

    document.body.classList.remove('admin-mode');
    // すべてのステップを非表示
    document.querySelectorAll('.step-section').forEach(el => {
      el.classList.remove('active');
    });

    // 指定したステップを表示
    document.getElementById('step-' + step).classList.add('active');

    // ステップ5への遷移時はサマリーを更新
    if (step === 5) {
      updateSummary();
    }

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // キャンセル画面へ遷移
  function goToCancel() {
    document.body.classList.remove('admin-mode');
    document.querySelectorAll('.step-section').forEach(el => {
      el.classList.remove('active');
    });
    document.getElementById('step-cancel').classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  let currentWeekStartDate = new Date(); // 今日の日付を基準にする

  function loadWeeklyCalendarFromStore() {
    const store = document.getElementById('store-select').value;
    if (!store) {
      document.getElementById('weekly-calendar-container').style.display = 'none';
      return;
    }

    bookingData.store = store;
    document.getElementById('weekly-calendar-container').style.display = 'block';

    // 今日の日付をスタートにする
    currentWeekStartDate = new Date();
    fetchWeeklyData();

    // 利用規約の更新
    updateTermsDisplay();
  }

  function changeWeek(delta) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 1ヶ月先（30日後）の制限
    const maxDate = new Date(today);
    maxDate.setDate(maxDate.getDate() + 30);

    const targetDate = new Date(currentWeekStartDate);
    targetDate.setDate(targetDate.getDate() + (delta * 7));

    if (delta > 0 && targetDate > maxDate) {
      alert('体験予約は1ヶ月先（30日後）までとなります。');
      return;
    }

    if (targetDate < today) {
      currentWeekStartDate = new Date(today);
    } else {
      currentWeekStartDate = targetDate;
    }

    fetchWeeklyData();
  }

  function fetchWeeklyData() {
    const store = document.getElementById('store-select').value;
    if (!store) return;

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';

    // YYYY-MM-DD
    const year = currentWeekStartDate.getFullYear();
    const month = String(currentWeekStartDate.getMonth() + 1).padStart(2, '0');
    const day = String(currentWeekStartDate.getDate()).padStart(2, '0');
    const dateStr = `${year}-${month}-${day}`;

    // 表示範囲の更新
    const endDate = new Date(currentWeekStartDate);
    endDate.setDate(endDate.getDate() + 6);
    document.getElementById('weekly-date-range').textContent =
      `${year}/${month}/${day} ～ ${endDate.getFullYear()}/${String(endDate.getMonth() + 1).padStart(2, '0')}/${String(endDate.getDate()).padStart(2, '0')}`;

    google.script.run
      .withSuccessHandler((weeklyData) => {
        loading.style.display = 'none';
        renderWeeklyCalendar(weeklyData);
      })
      .withFailureHandler((err) => {
        loading.style.display = 'none';
        alert('カレンダーの取得に失敗しました。');
      })
      .getWeeklyAvailableSlots(store, dateStr);
  }

  function renderWeeklyCalendar(weeklyData) {
    const grid = document.getElementById('weekly-grid');
    grid.innerHTML = '';

    if (!weeklyData || weeklyData.length === 0) {
      grid.innerHTML = '<p style="padding:20px;">表示できる枠がありません。</p>';
      return;
    }

    weeklyData.forEach(dayInfo => {
      // 日付ヘッダーの生成 (例: 5/13(水))
      const dateParts = dayInfo.date.split('/');
      const shortDate = `${parseInt(dateParts[1], 10)}/${parseInt(dateParts[2], 10)}`;

      const col = document.createElement('div');
      col.className = 'wc-col';

      const header = document.createElement('div');
      header.className = 'wc-header';
      header.textContent = shortDate + ' (' + dayInfo.dayName + ')';
      if (dayInfo.dayName === '土') header.classList.add('sat');
      if (dayInfo.dayName === '日') header.classList.add('sun');
      if (dayInfo.dayName === '祝') header.classList.add('holiday');
      col.appendChild(header);

      // スロットの生成
      if (!dayInfo.slots || dayInfo.slots.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'wc-slot';
        empty.innerHTML = '<div style="text-align:center; padding:10px; color:#999;">休業日</div>';
        col.appendChild(empty);
      } else {
        dayInfo.slots.forEach(slot => {
          const slotEl = document.createElement('div');
          slotEl.className = 'wc-slot';

          const timeEl = document.createElement('div');
          timeEl.className = 'wc-time';
          timeEl.textContent = slot.time;

          const remainEl = document.createElement('div');
          remainEl.className = 'wc-remain';

          const btn = document.createElement('button');
          btn.className = 'wc-btn';

          const slotDateObj = new Date(dayInfo.date.replace(/\//g, '-'));
          slotDateObj.setHours(0, 0, 0, 0);
          const maxSelectableDate = new Date();
          maxSelectableDate.setHours(0, 0, 0, 0);
          maxSelectableDate.setDate(maxSelectableDate.getDate() + 30);

          let isAvailable = slot.available;
          // 30日先を超える場合は予約不可
          if (slotDateObj > maxSelectableDate) {
            isAvailable = false;
          }

          if (isAvailable) {
            remainEl.textContent = `残数 ${slot.max - slot.booked}/${slot.max}`;
            remainEl.className = 'wc-remain available';
            btn.textContent = '予約';
            btn.onclick = () => selectWeeklySlot(dayInfo.date, slot.time);
          } else {
            remainEl.textContent = '残数: --';
            remainEl.className = 'wc-remain unavailable';
            btn.textContent = '受付終了';
            btn.disabled = true;
            btn.classList.add('disabled');
          }

          slotEl.appendChild(timeEl);
          slotEl.appendChild(remainEl);
          slotEl.appendChild(btn);
          col.appendChild(slotEl);
        });
      }

      grid.appendChild(col);
    });
  }

  function selectWeeklySlot(dateStr, timeStr) {
    bookingData.date = dateStr;
    bookingData.time = timeStr;
    updatePriceCardDisplay();
    goToStep(3);
  }

  function updatePriceCardDisplay() {
    const store = appConfig.stores.find(s => s.店舗名 === bookingData.store);
    if (!store) return;

    const defaultPlan = appConfig.config.DEFAULT_PLAN_NAME || '体験トレーニング';
    const defaultNormal = appConfig.config.DEFAULT_NORMAL_PRICE || '価格1,650円(税込)';
    const defaultCampaign = appConfig.config.DEFAULT_CAMPAIGN_PRICE || '0円';
    const defaultMemo = appConfig.config.DEFAULT_CAMPAIGN_MEMO || '';

    const planName = (store.プラン名 && store.プラン名.trim() !== '') ? store.プラン名 : defaultPlan;
    const normalPrice = (store.通常価格 && store.通常価格.trim() !== '') ? store.通常価格 : defaultNormal;
    const campaignPrice = (store.キャンペーン価格 && store.キャンペーン価格.trim() !== '') ? store.キャンペーン価格 : defaultCampaign;
    const campaignMemo = (store.キャンペーン備考 && store.キャンペーン備考.trim() !== '') ? store.キャンペーン備考 : defaultMemo;

    const priceCard = document.querySelector('.price-card');
    if (priceCard) {
      let memoHtml = '';
      if (campaignMemo) {
        memoHtml = `<div class="campaign-memo-box mt-3"><i class="icon-info"></i> ${campaignMemo.replace(/\n/g, '<br>')}</div>`;
      }
      let priceHtml = '';
      // キャンペーン価格がない（空文字または「なし」などの場合）、通常価格のみをシンプルに表示
      if (!campaignPrice || campaignPrice === 'なし' || campaignPrice === '0') {
        priceHtml = `
          <div class="price-item" style="width: 100%;">
            <span class="price-label highlight-label">通常価格</span>
            <span class="price-value campaign-price highlight">${normalPrice}</span>
          </div>
        `;
      } else {
        priceHtml = `
          <div class="price-item">
            <span class="price-label">通常価格</span>
            <span class="price-value original-price">${normalPrice}</span>
          </div>
          <div class="price-item">
            <span class="price-label highlight-label">キャンペーン価格</span>
            <span class="price-value campaign-price highlight">${campaignPrice}</span>
          </div>
        `;
      }

      priceCard.innerHTML = `
      <h3>${planName}</h3>
      <div class="price-row">
        ${priceHtml}
      </div>
      ${memoHtml}
    `;
    }
  }

  // 確認画面の表示を更新
  function updateSummary() {
    bookingData.name = document.getElementById('name').value;
    bookingData.kana = document.getElementById('kana').value;
    bookingData.phone = document.getElementById('phone').value;
    bookingData.email = document.getElementById('email').value;

    const storeInfo = appConfig.stores.find(s => s.店舗名 === bookingData.store);
    const defaultPlan = appConfig.config.DEFAULT_PLAN_NAME || '体験トレーニング';
    const defaultCampaign = appConfig.config.DEFAULT_CAMPAIGN_PRICE || '0円';
    const defaultNormal = appConfig.config.DEFAULT_NORMAL_PRICE || '価格1,650円(税込)';
    const defaultItems = appConfig.config.DEFAULT_EMAIL_ITEMS || '特になし';
    const defaultVisit = appConfig.config.DEFAULT_EMAIL_VISIT || '特になし';

    const planName = (storeInfo && storeInfo.プラン名 && storeInfo.プラン名.trim() !== '') ? storeInfo.プラン名 : defaultPlan;
    const campaignPrice = (storeInfo && storeInfo.キャンペーン価格 && storeInfo.キャンペーン価格.trim() !== '') ? storeInfo.キャンペーン価格 : defaultCampaign;
    const normalPrice = (storeInfo && storeInfo.通常価格 && storeInfo.通常価格.trim() !== '') ? storeInfo.通常価格 : defaultNormal;

    document.getElementById('sum-store').textContent = bookingData.store;
    document.getElementById('sum-datetime').textContent = `${bookingData.date} ${bookingData.time}`;
    const sumPlan = document.getElementById('sum-plan');
    if (sumPlan) {
      let resolvedPrice = '';
      if (!campaignPrice || campaignPrice === 'なし' || campaignPrice === '0') {
        resolvedPrice = normalPrice ? normalPrice.trim() : '';
      } else {
        resolvedPrice = campaignPrice ? campaignPrice.trim() : '';
      }

      if (resolvedPrice) {
        sumPlan.textContent = `${planName}（${resolvedPrice}）`;
      } else {
        sumPlan.textContent = planName;
      }
    }

    document.getElementById('sum-items').textContent = (storeInfo && storeInfo.メール持ち物 && storeInfo.メール持ち物.trim() !== '') ? storeInfo.メール持ち物 : defaultItems;
    document.getElementById('sum-visit').textContent = (storeInfo && storeInfo.メール来店案内 && storeInfo.メール来店案内.trim() !== '') ? storeInfo.メール来店案内 : defaultVisit;
    document.getElementById('sum-name').textContent = bookingData.name;
    document.getElementById('sum-phone').textContent = bookingData.phone;
    document.getElementById('sum-email').textContent = bookingData.email;

    // 確認事項のチェックボックスをリセット
    const checkbox = document.getElementById('confirm-items-check');
    if (checkbox) {
      checkbox.checked = false;
      toggleSubmitButton();
    }
  }

  // 予約確定ボタンの有効/無効を切り替え
  function toggleSubmitButton() {
    const checkbox = document.getElementById('confirm-items-check');
    const btn = document.getElementById('submit-btn');
    if (!checkbox || !btn) return;

    if (checkbox.checked) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
    }
  }

  // 予約を確定してGASへ送信
  function submitBooking() {
    const loading = document.getElementById('loading');
    loading.style.display = 'flex';

    google.script.run
      .withSuccessHandler((result) => {
        loading.style.display = 'none';
        if (result.success) {
          document.getElementById('finish-booking-id').textContent = result.bookingId;

          // すべてのステップを非表示にして完了画面を表示
          document.querySelectorAll('.step-section').forEach(el => {
            el.classList.remove('active');
          });
          document.getElementById('step-finish').classList.add('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          alert('予約に失敗しました。もう一度お試しください。\n' + (result.error || ''));
        }
      })
      .withFailureHandler((err) => {
        loading.style.display = 'none';
        alert('通信エラーが発生しました。');
      })
      .submitBooking(bookingData);
  }

  // キャンセル処理をGASへ送信
  function submitCancel() {
    const bookingId = document.getElementById('cancel-id').value;
    const email = document.getElementById('cancel-email').value;

    if (!bookingId || !email) return;

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';

    google.script.run
      .withSuccessHandler((result) => {
        loading.style.display = 'none';
        if (result.success) {
          document.getElementById('cancel-finish-name').textContent = result.name + ' 様';

          // すべてのステップを非表示にしてキャンセル完了画面を表示
          document.querySelectorAll('.step-section').forEach(el => {
            el.classList.remove('active');
          });
          document.getElementById('step-cancel-finish').classList.add('active');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          const msgBox = document.getElementById('cancel-message');
          msgBox.innerHTML = `<p style="color:red;">${result.error || 'キャンセルに失敗しました。'}</p>`;
        }
      })
      .withFailureHandler((err) => {
        loading.style.display = 'none';
        alert('通信エラーが発生しました。');
      })
      .cancelBooking(bookingId, email);
  }

  // ------------------------------------
  // 管理画面用ロジック
  // ------------------------------------

  function goToAdminAuth() {
    document.body.classList.add('admin-mode');
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById('step-admin-auth').classList.add('active');
  }

  function goToAdminMenu() {
    document.body.classList.add('admin-mode');
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById('step-admin-menu').classList.add('active');
  }

  function goToAdminSettings() {
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById('step-admin-dashboard').classList.add('active');
    buildAdminForm();

    // 店舗選択セレクトボックスと状態変数を初期化
    const selectEl = document.getElementById('admin-store-select');
    if (selectEl) {
      selectEl.value = '';
    }
    previousAdminStore = '';
    document.getElementById('admin-settings-container').style.display = 'none';
    clearDirty();
  }

  // 店舗・枠設定の店舗切り替え時の警告処理
  function changeAdminStore(selectElement) {
    if (isDirty) {
      if (!confirm('保存されていない変更があります。店舗を切り替えますか？（変更は破棄されます）')) {
        // 選択を元に戻す
        selectElement.value = previousAdminStore;
        return;
      }
      // 変更を破棄して元の状態に戻す
      if (originalAppConfig) {
        appConfig = JSON.parse(JSON.stringify(originalAppConfig));
      }
    }
    previousAdminStore = selectElement.value;
    loadAdminSettings();
  }

  function goToAdminCalendar() {
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById('step-admin-calendar').classList.add('active');
  }

  // プラン・キャンペーン設定画面へ遷移
  function goToAdminPlan() {
    document.querySelectorAll('.step-section').forEach(el => el.classList.remove('active'));
    document.getElementById('step-admin-plan').classList.add('active');

    // デフォルト設定の表示
    document.getElementById('sys-default-plan').value = appConfig.config.DEFAULT_PLAN_NAME || '';
    document.getElementById('sys-default-normal-price').value = appConfig.config.DEFAULT_NORMAL_PRICE || '';

    const defaultCampPrice = appConfig.config.DEFAULT_CAMPAIGN_PRICE || '';
    const isDefaultNoCamp = (defaultCampPrice === 'なし');
    document.getElementById('sys-default-no-campaign').checked = isDefaultNoCamp;
    document.getElementById('sys-default-campaign-price').value = isDefaultNoCamp ? '' : defaultCampPrice;
    document.getElementById('sys-default-campaign-memo').value = appConfig.config.DEFAULT_CAMPAIGN_MEMO || '';

    toggleDefaultCampaign();
    renderAdminPlanBlocks();
    clearDirty(); // フォーム自動入力によるDirtyフラグをクリア
  }

  function renderAdminPlanBlocks() {
    const container = document.getElementById('admin-plan-store-list-container');
    container.innerHTML = '';

    appConfig.stores.forEach((store, index) => {
      const div = document.createElement('div');
      div.className = 'admin-day-block';
      div.style.marginBottom = '20px';

      const isNoCamp = store.キャンペーン価格 === 'なし';

      div.innerHTML = `
      <div class="admin-day-header">
        <span>店舗 #${index + 1}: ${store.店舗名 || '新規店舗'}</span>
      </div>
      <div class="form-group">
        <label>プラン名（上書き）</label>
        <input type="text" class="form-control plan-name" value="${store.プラン名 || ''}" placeholder="デフォルトを使用">
      </div>
      <div class="form-group">
        <label>通常価格（上書き）</label>
        <input type="text" class="form-control plan-normal" value="${store.通常価格 || ''}" placeholder="デフォルトを使用">
      </div>
      <div class="form-group" style="margin-bottom: 8px;">
        <label class="admin-checkbox">

  let adminCalYear = new Date().getFullYear();
  let adminCalMonth = new Date().getMonth(); // 0-indexed
  let adminReservations = [];
  let adminSelectedDate = ''; // 'YYYY/MM/DD'

  function changeCalMonth(delta) {

    if (adminCalMonth > 11) {

    document.getElementById('admin-reservation-details').style.display = 'none';

    google.script.run
      .withSuccessHandler((reservations) => {

      })

  function renderAdminCalendar() {
    const container = document.getElementById('admin-calendar-container');
    container.style.display = 'block';

    const firstDay = new Date(adminCalYear, adminCalMonth, 1);
    const lastDay = new Date(adminCalYear, adminCalMonth + 1, 0);

    let html = '<table class="admin-calendar-table">';
    html += '<tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr>';

    let dayCount = 1;
    let currentDay = 0;

    for (let row = 0; row < 6; row++) {
      let rowHtml = '<tr>';
      for (let col = 0; col < 7; col++) {
        if (row === 0 && col < firstDay.getDay()) {
          rowHtml += '<td></td>';
        } else if (dayCount > lastDay.getDate()) {
          rowHtml += '<td></td>';
        } else {
          const dateStr = `${adminCalYear}/${String(adminCalMonth + 1).padStart(2, '0')}/${String(dayCount).padStart(2, '0')}`;
          // その日の予約をカウント
          const dayRes = adminReservations.filter(r => {
            // Google Apps Scriptからは 'YYYY/MM/DD' または 'YYYY-MM-DD' などで返ってくる
            return r.date.replace(/-/g, '/') === dateStr;
          });

          let cellClass = dayRes.length > 0 ? 'has-reservation' : '';
          let badgeHtml = dayRes.length > 0 ? `<span class="reservation-badge">${dayRes.length}件</span>` : '';

          rowHtml += `<td class="${cellClass}" onclick="selectAdminDate('${dateStr}')">
          <span class="date-num">${dayCount}</span>
          ${badgeHtml}
        </td>`;
          dayCount++;
        }
        currentDay++;
      }
      rowHtml += '</tr>';
      html += rowHtml;
      if (dayCount > lastDay.getDate()) break;
    }

    html += '</table>';
    container.innerHTML = html;
  }

  function selectAdminDate(dateStr) {
    adminSelectedDate = dateStr;
    document.getElementById('admin-reservation-details').style.display = 'block';
    document.getElementById('admin-selected-date-title').textContent = dateStr + ' の予約';

    // 手動予約フォームをリセット
    adminCancelManualBooking();

    const list = document.getElementById('admin-reservations-list');
    const dayRes = adminReservations.filter(r => r.date.replace(/-/g, '/') === dateStr);

    if (dayRes.length === 0) {
      list.innerHTML = '<p>予約はありません。</p>';
      return;
    }

    let html = '';
    dayRes.forEach(r => {
      html += '<div class="reservation-item">' +
        '<p><strong>時間:</strong> ' + r.time + '</p>' +
        '<p><strong>氏名:</strong> ' + r.name + ' (' + r.kana + ')</p>' +
        '<p><strong>電話:</strong> ' + r.phone + '</p>' +
        '<p><strong>Email:</strong> ' + r.email + '</p>' +
        '<p><strong>予約番号:</strong> ' + r.bookingId + '</p>' +
        '<button class="cancel-btn-small" onclick="adminCancelReservation(\'' + r.bookingId + '\')">キャンセルする</button>' +
        '</div>';
    });
    list.innerHTML = html;

    // スムーズスクロール
    document.getElementById('admin-reservation-details').scrollIntoView({ behavior: 'smooth' });
  }

  function adminCancelReservation(bookingId) {
    if (!confirm('この予約をキャンセルしますか？')) return;

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';

    google.script.run
      .withSuccessHandler((res) => {
        loading.style.display = 'none';
        if (res.success) {
          alert('キャンセルしました');
          loadAdminCalendar(); // 再読み込み
          document.getElementById('admin-reservation-details').style.display = 'none';
        } else {
          alert(res.error);
        }
      })
      .adminCancelBooking(bookingId);
  }

  // 管理画面：手動予約のフロー
  let adminSelectedTime = '';

  function adminShowSlotSelection() {
    const store = document.getElementById('admin-cal-store-select').value;
    if (!store || !adminSelectedDate) return;

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';

    // 1日分の空き状況を取得
    google.script.run
      .withSuccessHandler((weeklyData) => {
        loading.style.display = 'none';
        const grid = document.getElementById('admin-manual-slots-grid');
        grid.innerHTML = '';

        // 初日のスロットを取得
        const slots = weeklyData[0].slots;

        slots.forEach(slot => {
          const btn = document.createElement('button');
          btn.className = slot.available ? 'slot-btn' : 'slot-btn disabled';
          btn.disabled = !slot.available;
          btn.innerHTML = slot.time + '<br><small>' + (slot.available ? '空きあり' : '満席/終了') + '</small>';
          btn.onclick = () => selectAdminManualSlot(slot.time);
          grid.appendChild(btn);
        });

        document.getElementById('admin-manual-booking-start-btn').style.display = 'none';
        document.getElementById('admin-manual-slot-container').style.display = 'block';
      })
      .getWeeklyAvailableSlots(store, adminSelectedDate.replace(/\//g, '-'));
  }

  function selectAdminManualSlot(time) {
    adminSelectedTime = time;
    // ボタンの選択状態を更新
    document.querySelectorAll('#admin-manual-slots-grid .slot-btn').forEach(btn => {
      btn.classList.remove('selected');
      if (btn.textContent.includes(time)) btn.classList.add('selected');
    });

    document.getElementById('admin-manual-form-container').style.display = 'block';
  }

  function adminCancelManualBooking() {
    document.getElementById('admin-manual-slot-container').style.display = 'none';
    document.getElementById('admin-manual-form-container').style.display = 'none';
    document.getElementById('admin-manual-booking-start-btn').style.display = 'block';
    // フォームクリア
    document.getElementById('admin-manual-name').value = '';
    document.getElementById('admin-manual-phone').value = '';
  }

  function submitAdminManualBooking() {
    const name = document.getElementById('admin-manual-name').value;
    const phone = document.getElementById('admin-manual-phone').value;
    const store = document.getElementById('admin-cal-store-select').value;

    if (!name || !phone) {
      alert('名前と電話番号を入力してください。');
      return;
    }

    const bookingData = {
      store: store,
      date: adminSelectedDate,
      time: adminSelectedTime,
      name: name,
      phone: phone,
      kana: '(管理登録)',
      email: 'admin@example.com' // 管理登録用のダミー
    };

    const loading = document.getElementById('loading');
    loading.style.display = 'flex';

    google.script.run
      .withSuccessHandler((res) => {
        loading.style.display = 'none';
        if (res.success) {
          alert('手動予約を登録しました。');
          adminCancelManualBooking();
          loadAdminCalendar(); // 一覧更新
        } else {
          alert('エラー: ' + res.error);
        }
      })
      .submitBooking(bookingData);
  }
</script>
